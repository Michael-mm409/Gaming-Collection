version: '3.8'
services:
  db:
    container_name: gaming_db
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    container_name: gaming_web
    build:
      context: .
    command: gunicorn -w 2 -b 0.0.0.0:5050 'src.app:create_app()'
    # command: flask run --host=0.0.0.0 --port=5050
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - ./requirements.txt:/app/requirements.txt
      - ./static:/app/static
    environment:
      - FLASK_ENV=production
      - FLASK_APP=src/run.py
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: gaming_nginx
    ports:
      - "5050:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - web

volumes:
  pgdata: