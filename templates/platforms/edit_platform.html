{% extends 'base/base.html' %}
{% block content %}
<h2>Edit Platform</h2>
<form method="post">
    <div class="mb-3"><label>Name: <input type="text" name="name" class="form-control" value="{{ platform.name }}" required></label></div>
    <div class="mb-3"><label>Manufacturer: <input type="text" name="manufacturer" class="form-control" value="{{ platform.manufacturer }}"></label></div>
    <div class="mb-3"><label>Release Year: <input type="number" name="release_year" class="form-control" value="{{ platform.release_year }}"></label></div>
    <div class="mb-3"><label>Generation: <input type="text" name="generation" class="form-control" value="{{ platform.generation }}"></label></div>
    <div class="mb-3"><label>Description: <textarea name="description" class="form-control">{{ platform.description }}</textarea></label></div>
    <div class="mb-3"><label>Cost: <input type="number" step="0.01" name="cost" class="form-control" value="{{ platform.cost }}"></label></div>
    <div class="mb-3"><label>Quantity: <input type="number" name="quantity" class="form-control" value="{{ platform.quantity }}"></label></div>
    <div class="mb-3"><label>Purchased From: <input type="text" name="purchased_from" class="form-control" value="{{ platform.purchased_from }}"></label></div>
    <div class="mb-3"><label>Ownership:
        <select name="ownership_id" class="form-control">
            <option value="">--</option>
            {% for o in ownerships %}
            <option value="{{ o.id }}" {% if platform.ownership_id == o.id %}selected{% endif %}>{{ o.name }}</option>
            {% endfor %}
        </select>
    </label></div>
    <div class="mb-3"><label>Notes: <textarea name="notes" class="form-control">{{ platform.notes }}</textarea></label></div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('main.platforms') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
