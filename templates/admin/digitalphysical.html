{% extends 'base/base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Manage Digital/Physical Options</h2>
    <form method="post" class="mb-3">
        <input type="hidden" name="action" value="add">
        <div class="input-group">
            <input type="text" name="name" class="form-control" placeholder="Add new option (Digital/Physical)" required>
            <button type="submit" class="btn btn-primary">Add</button>
        </div>
    </form>
    <table class="table table-striped">
        <thead><tr><th>Option</th><th>Actions</th></tr></thead>
        <tbody>
        {% for dp in digital_physical_options %}
        <tr>
            <form method="post">
                <td>
                    <input type="hidden" name="action" value="edit">
                    <input type="hidden" name="dp_id" value="{{ dp.id }}">
                    <input type="text" name="name" value="{{ dp.name }}" class="form-control" required>
                </td>
                <td>
                    <button type="submit" class="btn btn-sm btn-success">Save</button>
            </form>
            <form method="post" style="display:inline-block">
                <input type="hidden" name="action" value="delete">
                <input type="hidden" name="dp_id" value="{{ dp.id }}">
                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this option?')">Delete</button>
            </form>
                </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Home</a>
</div>
{% endblock %}
